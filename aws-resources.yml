AWSTemplateFormatVersion: "2010-09-09"

Description:
  AWS CloudFormation template for creating resources for the secure-video app.

Resources:
  
  ShopifySessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: shopify_sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: shop
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: shop_index
          KeySchema:
            - AttributeName: shop
              KeyType: HASH
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - id
              - shop
      # Enable TTL using Shopify's default expiration attribute
      TimeToLiveSpecification:
        AttributeName: expires
        Enabled: true

Outputs:
  TableArn:
    Description: 'The ARN of the created Shopify sessions table'
    Value: !GetAtt ShopifySessionsTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TableArn'
